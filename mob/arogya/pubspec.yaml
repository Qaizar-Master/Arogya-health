name: arogya
description: Arogya — Chronic Disease Management for Patients
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # State management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # Charts
  fl_chart: ^0.67.0

  # Date formatting
  intl: ^0.19.0

  # UUID generation (offline localId)
  uuid: ^4.3.3

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
